<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Férias</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#172033;
  --muted:#697386;
  --line:#e4e9f2;
  --primary:#1557d5;
  --primary-soft:#edf4ff;
  --green:#139867;
  --green-soft:#e8f7f1;
  --orange:#f39a0a;
  --orange-soft:#fff4df;
  --red:#d93e55;
  --red-soft:#ffecef;
  --blue:#2f7de1;
  --blue-soft:#edf5ff;
  --purple:#7449df;
  --purple-soft:#f1ecff;
  --shadow:0 10px 30px rgba(24,43,77,.07);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:linear-gradient(180deg,#f8faff 0,#f4f7fb 260px,#f4f7fb 100%);
  color:var(--text)
}
button,input,select,textarea{font:inherit}
.header{
  background:rgba(255,255,255,.94);
  color:var(--text);
  padding:15px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  position:sticky;
  top:0;
  z-index:20;
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px)
}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{
  width:42px;height:42px;border-radius:12px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,#1968ed,#1748b9);
  color:#fff;font-size:21px;
  box-shadow:0 8px 20px rgba(21,87,213,.24)
}
.header h1{font-size:22px;margin:0;letter-spacing:-.02em}
.header p{font-size:12px;margin:3px 0 0;color:var(--muted)}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  border:0;border-radius:9px;padding:9px 13px;
  font-weight:800;cursor:pointer;transition:.15s
}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--primary);color:#fff}
.btn.soft{background:var(--primary-soft);color:var(--primary);border:1px solid #cfe0ff}
.btn.outline{background:white;border:1px solid var(--line);color:var(--text)}
.container{max-width:1540px;margin:auto;padding:18px 22px 28px}
.statusbar{
  font-size:12px;color:var(--muted);margin-bottom:11px;
  display:flex;align-items:center;gap:7px
}
.statusbar:before{
  content:"";width:8px;height:8px;border-radius:50%;background:var(--green)
}
.statusbar.error{color:var(--red)}
.statusbar.error:before{background:var(--red)}
.metrics{
  display:grid;
  grid-template-columns:repeat(7,minmax(115px,1fr));
  gap:10px;
  margin-bottom:13px
}
.metric{
  position:relative;
  overflow:hidden;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px 14px 12px 52px;
  min-height:78px;
  box-shadow:0 5px 18px rgba(24,43,77,.045)
}
.metric:before{
  position:absolute;left:13px;top:16px;
  width:30px;height:30px;border-radius:10px;
  display:grid;place-items:center;
  background:var(--blue-soft);color:var(--blue);
  font-size:16px;font-weight:900
}
.metric:nth-child(1):before{content:"👥"}
.metric:nth-child(2):before{content:"📄"}
.metric:nth-child(3):before{content:"✓";background:var(--green-soft);color:var(--green)}
.metric:nth-child(4):before{content:"◷";background:var(--orange-soft);color:var(--orange)}
.metric:nth-child(5):before{content:"▣"}
.metric:nth-child(6):before{content:"✓";background:var(--purple-soft);color:var(--purple)}
.metric:nth-child(7):before{content:"!";background:var(--red-soft);color:var(--red)}
.metric strong{display:block;font-size:24px;line-height:1.05;margin-bottom:5px}
.metric span{font-size:11px;color:var(--muted);font-weight:800}
.metric.alert strong{color:var(--red)}

.filters{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  display:grid;
  grid-template-columns:minmax(250px,2fr) repeat(5,minmax(115px,1fr)) auto;
  gap:9px;
  align-items:end;
  box-shadow:var(--shadow)
}
.field label{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;font-weight:900;color:var(--muted);margin:0 0 5px
}
.field input,.field select{
  width:100%;border:1px solid #d9e0ec;border-radius:9px;
  padding:8px 10px;background:#fff;min-height:38px;color:var(--text)
}
.field input:focus,.field select:focus{
  outline:3px solid rgba(21,87,213,.11);border-color:#8eb1f5
}

.tabs{
  display:flex;gap:0;overflow-x:auto;
  padding:13px 0 10px
}
.tab{
  white-space:nowrap;border:1px solid var(--line);border-right:0;
  background:#fff;padding:9px 16px;font-size:12px;font-weight:900;
  color:#526078;cursor:pointer;border-radius:0
}
.tab:first-child{border-radius:9px 0 0 9px}
.tab:last-child{border-right:1px solid var(--line);border-radius:0 9px 9px 0}
.tab.active{
  background:linear-gradient(135deg,#1766e8,#1649b8);
  color:#fff;border-color:#1557d5
}

.months{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  margin-bottom:16px
}
.month{
  border:1px solid var(--line);
  background:#fff;
  padding:11px 12px 10px;
  border-radius:12px;
  font-size:10px;font-weight:800;
  cursor:pointer;color:#596579;
  text-align:left;
  min-height:155px;
  display:flex;flex-direction:column;
  transition:.16s;
  box-shadow:0 3px 12px rgba(24,43,77,.035)
}
.month:hover{
  border-color:#b7c8e6;
  box-shadow:0 8px 22px rgba(24,43,77,.08);
  transform:translateY(-1px)
}
.month.active{
  background:linear-gradient(180deg,#f2f6ff,#eef3ff);
  color:var(--primary);
  border-color:#a9c1fb;
  box-shadow:0 7px 20px rgba(21,87,213,.10)
}
.month-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding-bottom:8px;border-bottom:1px solid var(--line)
}
.month-title{font-size:15px;font-weight:950;letter-spacing:-.01em;color:#22416f}
.month.active .month-title{color:var(--primary)}
.month-count{
  min-width:28px;height:24px;padding:0 8px;border-radius:999px;
  background:#edf2f8;color:#526078;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px
}
.month.active .month-count{background:#dce7ff;color:var(--primary)}
.month-summary{
  padding-top:8px;display:flex;flex-direction:column;gap:6px;
  overflow:hidden;flex:1
}
.month-person{
  position:relative;
  padding-left:13px;
  font-size:11px;font-weight:750;color:#44516a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.month-person:before{
  content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--blue)
}
.month-person.current:before{background:var(--green)}
.month-person.upcoming:before{background:var(--orange)}
.month-person.future:before{background:var(--blue)}
.month-person.done:before{background:var(--purple)}
.month-person.alerts:before{background:var(--red)}
.month-more{
  margin-top:auto;padding-top:4px;
  font-size:10px;color:var(--primary);font-weight:900
}
.month-empty{font-size:10px;font-weight:650;color:#9aa4b4;font-style:italic}

.section-head{display:flex;justify-content:space-between;align-items:center;margin:10px 2px}
.section-head h2{font-size:17px;margin:0}
.section-head span{font-size:12px;color:var(--muted)}
.list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.person{
  background:#fff;border:1px solid var(--line);border-left:4px solid #aab4c3;
  border-radius:11px;padding:11px 13px;
  display:grid;grid-template-columns:minmax(0,1.35fr) minmax(170px,.9fr) auto;
  gap:10px;align-items:center;cursor:pointer;
  box-shadow:0 3px 10px rgba(31,47,75,.04);transition:.15s
}
.person:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(31,47,75,.09)}
.person.upcoming{border-left-color:var(--orange)}
.person.current{border-left-color:var(--green)}
.person.future{border-left-color:var(--blue)}
.person.done{border-left-color:var(--purple);opacity:.9}
.person.warning{box-shadow:inset 0 0 0 1px #f3cf78}
.name{font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.period-main{font-size:13px;font-weight:850}
.period-sub{font-size:11px;color:var(--muted);margin-top:3px}
.chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.chip{padding:4px 7px;border-radius:999px;font-size:10px;font-weight:850;background:#eef1f5;color:#596579}
.chip.warn{background:var(--orange-soft);color:#9b6200}
.chip.red{background:var(--red-soft);color:#ae2f45}
.chip.green{background:var(--green-soft);color:#117448}
.chip.blue{background:var(--blue-soft);color:#1f6593}
.chip.purple{background:var(--purple-soft);color:#6442b5}
.empty{grid-column:1/-1;background:#fff;border:1px dashed #cfd7e3;border-radius:12px;padding:44px;text-align:center;color:var(--muted)}

.drawer-back{position:fixed;inset:0;background:rgba(12,20,35,.35);display:none;z-index:40}
.drawer{position:fixed;right:-520px;top:0;width:min(500px,94vw);height:100vh;background:white;z-index:50;transition:.25s;box-shadow:-12px 0 30px rgba(0,0,0,.18);display:flex;flex-direction:column}
.drawer.open{right:0}.drawer-back.open{display:block}
.drawer-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}
.drawer-head h3{margin:0;font-size:17px}
.close{border:0;background:#eef1f5;width:32px;height:32px;border-radius:50%;cursor:pointer}
.drawer-body{padding:16px 18px;overflow:auto}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.detail{border:1px solid var(--line);border-radius:8px;padding:8px}
.detail small{display:block;color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase}
.detail b{font-size:12px}
.period-card{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:7px}
.period-card h4{margin:0 0 5px;font-size:12px}
.drawer label{font-size:11px;font-weight:800;color:var(--muted);display:block;margin:10px 0 4px}
.drawer select,.drawer textarea{width:100%;border:1px solid #d8deea;border-radius:8px;padding:9px}
.drawer textarea{min-height:90px;resize:vertical}
.save{margin-top:10px;width:100%;background:var(--primary);color:white}
.notice{display:none;background:#fff6d9;border:1px solid #efd083;color:#715000;border-radius:10px;padding:9px 12px;font-size:12px;margin-bottom:10px}

@media(max-width:1180px){
  .metrics{grid-template-columns:repeat(4,1fr)}
  .filters{grid-template-columns:repeat(3,1fr)}
  .months{grid-template-columns:repeat(3,minmax(0,1fr))}
  .list{grid-template-columns:1fr}
}
@media(max-width:760px){
  .header{position:static;padding:13px}
  .container{padding:11px}
  .brand-icon{width:38px;height:38px}
  .header h1{font-size:18px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .metric{padding-left:48px}
  .filters{grid-template-columns:1fr 1fr}
  .filters .search{grid-column:1/-1}
  .months{grid-template-columns:repeat(2,minmax(0,1fr))}
  .month{min-height:145px}
  .person{grid-template-columns:1fr}
  .chips{justify-content:flex-start}
  .detail-grid{grid-template-columns:1fr}
  .header p{display:none}
}
@media(max-width:460px){
  .months{grid-template-columns:1fr}
  .actions .btn.primary{display:none}
}
@media print{
  .header,.filters,.tabs,.months,.actions,.drawer,.drawer-back{display:none!important}
  .container{max-width:none}.list{grid-template-columns:1fr 1fr}.person{break-inside:avoid}
}

.edit-section{
  margin-top:16px;
  border-top:1px solid var(--line);
  padding-top:14px
}
.edit-section h4{
  margin:0 0 10px;
  font-size:13px;
  color:var(--text)
}
.edit-period{
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  background:#fafcff
}
.edit-period-title{
  font-size:11px;
  font-weight:900;
  color:var(--primary);
  margin-bottom:8px
}
.edit-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px
}
.edit-field label{
  margin:0 0 4px;
  font-size:10px;
  text-transform:uppercase
}
.edit-field input{
  width:100%;
  border:1px solid #d8deea;
  border-radius:8px;
  padding:8px
}
.check-row{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin:10px 0
}
.check-row label{
  display:flex;
  align-items:center;
  gap:6px;
  margin:0;
  color:var(--text);
  font-size:12px
}
.edit-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px
}
.btn.danger-soft{
  background:#fff1f3;
  color:#b4233d;
  border:1px solid #ffd0d8
}
.history-box{
  margin-top:12px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  background:#fff
}
.history-box h5{
  margin:0 0 8px;
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase
}
.history-item{
  font-size:11px;
  color:#556176;
  padding:7px 0;
  border-top:1px solid #eef1f5
}
.history-item:first-of-type{border-top:0}
@media(max-width:560px){
  .edit-row,.edit-actions{grid-template-columns:1fr}
}

</style>

</head>
<body>
<header class="header">
  <div class="brand">
    <div class="brand-icon">🗓</div>
    <div><h1>Gestão de Férias</h1><p>Planejamento, alertas e acompanhamento dos períodos</p></div>
  </div>
  <div class="actions">
    <button class="btn soft" onclick="document.getElementById('file').click()">↻ Atualizar dados</button>
    <button class="btn primary" onclick="window.print()">Imprimir</button>
    <input id="file" type="file" accept=".xlsx,.xls" hidden>
  </div>
</header>
<main class="container">
<div id="status" class="statusbar">Procurando a planilha automática...</div>
<div id="notice" class="notice"></div>
<section class="metrics">
<div class="metric"><strong id="mPeople">0</strong><span>Servidores</span></div><div class="metric"><strong id="mPeriods">0</strong><span>Períodos</span></div><div class="metric"><strong id="mCurrent">0</strong><span>Em férias</span></div><div class="metric"><strong id="mUpcoming">0</strong><span>Próximos 30 dias</span></div><div class="metric"><strong id="mFuture">0</strong><span>Futuros</span></div><div class="metric"><strong id="mDone">0</strong><span>Concluídos</span></div><div class="metric alert"><strong id="mAlerts">0</strong><span>Alertas</span></div>
</section>
<section class="filters">
<div class="field search"><label>Pesquisar</label><input id="q" placeholder="Nome, setor, cargo, gestor..."></div>
<div class="field"><label>Setor</label><select id="sector"><option value="">Todos</option></select></div>
<div class="field"><label>Ano</label><select id="year"><option value="">Todos</option></select></div>
<div class="field"><label>Mês</label><select id="month"><option value="">Todos</option></select></div>
<div class="field"><label>Status RH</label><select id="approval"><option value="">Todos</option><option>Pendente</option><option>Aprovado</option><option>Ajustar</option><option>Indeferido</option></select></div>
<div class="field"><label>Benefício</label><select id="benefit"><option value="">Todos</option><option value="sell">Venda 10 dias</option><option value="thirteen">Adiantamento 13º</option></select></div>
<button class="btn outline" onclick="clearFilters()">Limpar</button>
</section>
<div class="tabs" id="tabs"></div>
<div class="months" id="months"></div>
<div class="section-head"><h2 id="title">Todos os períodos</h2><span id="count">0 resultados</span></div>
<section class="list" id="list"></section>
</main>
<div class="drawer-back" id="back" onclick="closeDrawer()"></div><aside class="drawer" id="drawer"><div class="drawer-head"><div><h3 id="dName"></h3><div class="sub" id="dSub"></div></div><button class="close" onclick="closeDrawer()">✕</button></div><div class="drawer-body" id="dBody"></div></aside>
<script>
const FILES=['Formulário de Intenção de Férias.xlsx','Formulario de Intencao de Ferias.xlsx','Formulário de Intenção de Férias (respostas) (2).xlsx'];
const COL={name:'Nome Completo:',mat:'Matrícula/ID:',sector:'Departamento/Setor:',role:'Cargo Atual:',email:'E-mail Corporativo:',manager:'Gestor Direto (Nome do superior imediato):',type:'Tipo de Solicitação:',qty:'Quantidade de Dias Solicitados:',sell:'Deseja vender 10 dias de férias? (Abono Pecuniário)',thirteen:'Deseja adiantar a 1ª parcela do 13º Salário?'};
const state={people:[],periods:[],tab:'all',selected:null};
const TAB_ITEMS=[['all','Todos'],['upcoming','Próximas'],['current','Em férias'],['future','Futuras'],['done','Concluídas'],['alerts','Alertas']];
const MONTH_NAMES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function norm(s){return String(s??'').trim()}
function yes(v){return /^sim/i.test(norm(v))}
function parseDate(v){if(!v)return null;if(v instanceof Date&&!isNaN(v))return new Date(v.getFullYear(),v.getMonth(),v.getDate());if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);return d?new Date(d.y,d.m-1,d.d):null}const s=norm(v);const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);const d=new Date(s);return isNaN(d)?null:new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function fmt(d){return d?d.toLocaleDateString('pt-BR'):'—'}
function dayDiff(a,b){return Math.round((b-a)/86400000)}
function inclusive(a,b){return a&&b?dayDiff(a,b)+1:0}
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function get(row,label){const key=Object.keys(row).find(k=>norm(k)===label);return row[key]}
function decisionKey(person){return 'ferias:'+norm(person.name).toLowerCase()+'|'+norm(person.email).toLowerCase()+'|'+norm(person.sector).toLowerCase()}
function loadDecision(p){
  try{
    return JSON.parse(localStorage.getItem(decisionKey(p)))||{
      status:'Pendente',
      note:'',
      edits:null,
      history:[]
    }
  }catch{
    return {status:'Pendente',note:'',edits:null,history:[]}
  }
}
function classify(p){const t=today();if(!p.start||!p.end)return 'alerts';if(p.end<t)return'done';if(p.start<=t&&p.end>=t)return'current';const n=dayDiff(t,p.start);if(n>=0&&n<=30)return'upcoming';return'future'}
function process(rows){
  state.people=[];
  state.periods=[];
  rows.forEach((r,i)=>{
    const person={
      id:i,
      name:norm(get(r,COL.name))||'Sem nome',
      mat:norm(get(r,COL.mat)),
      sector:norm(get(r,COL.sector))||'Não informado',
      role:norm(get(r,COL.role)),
      email:norm(get(r,COL.email)),
      manager:norm(get(r,COL.manager)),
      type:norm(get(r,COL.type)),
      qty:norm(get(r,COL.qty)),
      sell:yes(get(r,COL.sell)),
      thirteen:yes(get(r,COL.thirteen)),
      periods:[]
    };

    person.original={
      sell:person.sell,
      thirteen:person.thirteen,
      periods:[]
    };

    person.decision=loadDecision(person);

    for(let n=1;n<=3;n++){
      const start=parseDate(get(r,`${n}º Período - Data de Início:`));
      const end=parseDate(get(r,`${n}º Período - Data de Término:`));
      person.original.periods.push({
        index:n,
        start:start?start.toISOString().slice(0,10):'',
        end:end?end.toISOString().slice(0,10):''
      });
    }

    if(person.decision.edits){
      person.sell=!!person.decision.edits.sell;
      person.thirteen=!!person.decision.edits.thirteen;
    }

    const sourcePeriods=person.decision.edits?.periods||person.original.periods;

    sourcePeriods.forEach(item=>{
      const start=parseDate(item.start);
      const end=parseDate(item.end);
      if(start||end){
        const p={
          id:`${i}-${item.index}`,
          person,
          index:item.index,
          start,
          end,
          days:inclusive(start,end),
          issues:[]
        };
        if(!start||!end)p.issues.push('Data incompleta');
        if(start&&end&&end<start)p.issues.push('Término anterior ao início');
        person.periods.push(p);
        state.periods.push(p);
      }
    });

    state.people.push(person);
  });

  detectConflicts();
  fillFilters();
  renderAll();
}
function detectConflicts(){for(const p of state.periods){if(!p.start||!p.end)continue;for(const q of state.periods){if(p===q||p.person.sector.toLowerCase()!==q.person.sector.toLowerCase()||!q.start||!q.end)continue;if(p.start<=q.end&&q.start<=p.end&&!p.issues.includes('Sobreposição no setor'))p.issues.push('Sobreposição no setor')}}}
function fillFilters(){const sectors=[...new Set(state.people.map(p=>p.sector))].sort();sector.innerHTML='<option value="">Todos</option>'+sectors.map(x=>`<option>${esc(x)}</option>`).join('');const years=[...new Set(state.periods.flatMap(p=>[p.start?.getFullYear(),p.end?.getFullYear()]).filter(Boolean))].sort();year.innerHTML='<option value="">Todos</option>'+years.map(x=>`<option>${x}</option>`).join('');month.innerHTML='<option value="">Todos</option>'+MONTH_NAMES.map((x,i)=>`<option value="${i}">${x}</option>`).join('')}
function filterPeriods(){const query=norm(q.value).toLowerCase(),sec=sector.value,yr=year.value,mo=month.value,ap=approval.value,ben=benefit.value;return state.periods.filter(p=>{const c=classify(p);if(state.tab!=='all'&&state.tab!=='alerts'&&c!==state.tab)return false;if(state.tab==='alerts'&&p.issues.length===0)return false;const person=p.person;const hay=[person.name,person.sector,person.role,person.manager,person.email].join(' ').toLowerCase();if(query&&!hay.includes(query))return false;if(sec&&person.sector!==sec)return false;if(yr&&!([p.start?.getFullYear(),p.end?.getFullYear()].includes(+yr)))return false;if(mo!==''&&!(p.start&&p.end&&(+mo>=p.start.getMonth()&&+mo<=p.end.getMonth() || p.start.getFullYear()!==p.end.getFullYear()&&(+mo>=p.start.getMonth()||+mo<=p.end.getMonth()))))return false;if(ap&&person.decision.status!==ap)return false;if(ben==='sell'&&!person.sell)return false;if(ben==='thirteen'&&!person.thirteen)return false;return true}).sort((a,b)=>(a.start||new Date(2999,0,1))-(b.start||new Date(2999,0,1)))}
function renderAll(){renderTabs();renderMonths();renderMetrics();renderList()}
function renderTabs(){document.getElementById('tabs').innerHTML=TAB_ITEMS.map(([k,l])=>`<button class="tab ${state.tab===k?'active':''}" onclick="setTab('${k}')">${l}</button>`).join('')}
function shortName(fullName){
  const clean=norm(fullName);
  if(!clean||clean.includes('@'))return 'Nome não informado';
  const parts=clean.split(/\s+/).filter(Boolean);
  if(parts.length<=1)return parts[0]||'Nome não informado';
  return `${parts[0]} ${parts[parts.length-1]}`;
}
function periodTouchesMonth(p,m){if(!p.start||!p.end)return false;const selectedYear=year.value?Number(year.value):null;const startYear=p.start.getFullYear(),endYear=p.end.getFullYear();if(selectedYear){const first=new Date(selectedYear,m,1),last=new Date(selectedYear,m+1,0,23,59,59,999);return p.start<=last&&p.end>=first}if(startYear===endYear)return p.start.getMonth()<=m&&p.end.getMonth()>=m;return m>=p.start.getMonth()||m<=p.end.getMonth()}
function renderMonths(){
  const data=Array.from({length:12},()=>({count:0,people:new Map()}));
  state.periods.forEach(p=>{
    for(let m=0;m<12;m++){
      if(periodTouchesMonth(p,m)){
        data[m].count++;
        const key=(p.person.email||p.person.name||p.person.id).toLowerCase();
        if(!data[m].people.has(key)){
          data[m].people.set(key,{name:shortName(p.person.name),status:classify(p)});
        }
      }
    }
  });

  document.getElementById('months').innerHTML=MONTH_NAMES.map((m,i)=>{
    const people=[...data[i].people.values()]
      .sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
    const visible=people.slice(0,5);
    const hidden=Math.max(0,people.length-visible.length);

    return `<button class="month ${month.value==i?'active':''}" onclick="pickMonth(${i})">
      <span class="month-head">
        <span class="month-title">${m}</span>
        <span class="month-count">${data[i].count}</span>
      </span>
      <span class="month-summary">
        ${visible.length
          ? visible.map(person=>`<span class="month-person ${person.status}">${esc(person.name)}</span>`).join('')
          : '<span class="month-empty">Nenhuma solicitação</span>'}
        ${hidden?`<span class="month-more">+${hidden} outro${hidden>1?'s':''}</span>`:''}
      </span>
    </button>`;
  }).join('');
}
function renderMetrics(){const classes=state.periods.map(classify);mPeople.textContent=state.people.length;mPeriods.textContent=state.periods.length;mCurrent.textContent=classes.filter(x=>x==='current').length;mUpcoming.textContent=classes.filter(x=>x==='upcoming').length;mFuture.textContent=classes.filter(x=>x==='future').length;mDone.textContent=classes.filter(x=>x==='done').length;mAlerts.textContent=state.periods.filter(p=>p.issues.length).length}
function renderList(){const arr=filterPeriods();count.textContent=`${arr.length} resultado${arr.length===1?'':'s'}`;title.textContent=TAB_ITEMS.find(x=>x[0]===state.tab)?.[1]||'Períodos';if(!arr.length){list.innerHTML='<div class="empty">Nenhum período encontrado com os filtros selecionados.</div>';return}list.innerHTML=arr.map(card).join('')}
function card(p){const c=classify(p),t=today(),until=p.start?dayDiff(t,p.start):null;const chips=[];if(c==='upcoming')chips.push(`<span class="chip warn">Faltam ${until} dias</span>`);if(c==='current')chips.push('<span class="chip green">Em férias</span>');if(c==='done')chips.push('<span class="chip">Concluído</span>');if(p.person.sell)chips.push('<span class="chip purple">Venda 10 dias</span>');if(p.person.thirteen)chips.push('<span class="chip blue">13º</span>');if(p.issues.length)chips.push(`<span class="chip red">${p.issues.length} alerta${p.issues.length>1?'s':''}</span>`);if(p.person.decision.status!=='Pendente')chips.push(`<span class="chip">${esc(p.person.decision.status)}</span>`);return `<article class="person ${c} ${p.issues.length?'warning':''}" onclick="openDrawer('${p.id}')"><div><div class="name">${esc(p.person.name)}</div><div class="sub">${esc(p.person.sector)}${p.person.role?' · '+esc(p.person.role):''}</div></div><div><div class="period-main">${fmt(p.start)} → ${fmt(p.end)}</div><div class="period-sub">${p.index}º período · ${p.days||0} dia(s)</div></div><div class="chips">${chips.join('')}</div></article>`}
function dateInputValue(d){
  return d?d.toISOString().slice(0,10):'';
}

function openDrawer(id){
  const p=state.periods.find(x=>x.id===id);
  if(!p)return;

  state.selected=p;
  const person=p.person;
  dName.textContent=person.name;
  dSub.textContent=[person.sector,person.role].filter(Boolean).join(' · ');

  const periodInputs=[1,2,3].map(index=>{
    const item=person.periods.find(x=>x.index===index);
    return `<div class="edit-period">
      <div class="edit-period-title">${index}º período</div>
      <div class="edit-row">
        <div class="edit-field">
          <label>Data de início</label>
          <input type="date" id="editStart${index}" value="${item?dateInputValue(item.start):''}">
        </div>
        <div class="edit-field">
          <label>Data de término</label>
          <input type="date" id="editEnd${index}" value="${item?dateInputValue(item.end):''}">
        </div>
      </div>
    </div>`;
  }).join('');

  const history=(person.decision.history||[]).slice().reverse();
  const historyHtml=history.length
    ? history.map(h=>`<div class="history-item"><b>${esc(h.date)}</b><br>${esc(h.description)}</div>`).join('')
    : '<div class="history-item">Nenhuma alteração registrada.</div>';

  dBody.innerHTML=`
    <div class="detail-grid">
      <div class="detail"><small>Matrícula</small><b>${esc(person.mat||'Não informada')}</b></div>
      <div class="detail"><small>Gestor</small><b>${esc(person.manager||'Não informado')}</b></div>
      <div class="detail"><small>E-mail</small><b>${esc(person.email||'Não informado')}</b></div>
      <div class="detail"><small>Solicitação</small><b>${esc(person.type||'Não informada')}</b></div>
    </div>

    <label>Status do RH</label>
    <select id="dStatus">
      <option>Pendente</option>
      <option>Aprovado</option>
      <option>Ajustar</option>
      <option>Indeferido</option>
    </select>

    <label>Observações</label>
    <textarea id="dNote" placeholder="Registre orientações ou ajustes necessários..."></textarea>

    <div class="edit-section">
      <h4>Alterar solicitação</h4>
      ${periodInputs}

      <div class="check-row">
        <label><input type="checkbox" id="editSell" ${person.sell?'checked':''}> Venda de 10 dias</label>
        <label><input type="checkbox" id="editThirteen" ${person.thirteen?'checked':''}> Adiantamento do 13º</label>
      </div>

      <label>Motivo da alteração</label>
      <textarea id="editReason" placeholder="Ex.: solicitação do servidor, ajuste de datas, conflito no setor..."></textarea>

      <div class="edit-actions">
        <button class="btn primary" onclick="saveRequestChanges()">Salvar alterações</button>
        <button class="btn danger-soft" onclick="restoreOriginalRequest()">Restaurar original</button>
      </div>

      <div class="history-box">
        <h5>Histórico de alterações</h5>
        ${historyHtml}
      </div>
    </div>

    <button class="btn save" onclick="saveDecision()">Salvar tratamento do RH</button>
  `;

  dStatus.value=person.decision.status||'Pendente';
  dNote.value=person.decision.note||'';
  drawer.classList.add('open');
  back.classList.add('open');
}

function saveDecision(){
  const p=state.selected;
  if(!p)return;
  p.person.decision={
    ...p.person.decision,
    status:dStatus.value,
    note:dNote.value,
    edits:p.person.decision.edits||null,
    history:p.person.decision.history||[]
  };
  localStorage.setItem(decisionKey(p.person),JSON.stringify(p.person.decision));
  closeDrawer();
  renderAll();
}

function saveRequestChanges(){
  const selected=state.selected;
  if(!selected)return;

  const person=selected.person;
  const periods=[1,2,3].map(index=>({
    index,
    start:document.getElementById(`editStart${index}`).value,
    end:document.getElementById(`editEnd${index}`).value
  }));

  for(const item of periods){
    if((item.start&&!item.end)||(!item.start&&item.end)){
      alert(`Preencha as duas datas do ${item.index}º período ou deixe ambas vazias.`);
      return;
    }
    if(item.start&&item.end&&new Date(item.end)<new Date(item.start)){
      alert(`No ${item.index}º período, a data final não pode ser anterior à data inicial.`);
      return;
    }
  }

  const reason=norm(document.getElementById('editReason').value)||'Alteração realizada no sistema';
  const now=new Date().toLocaleString('pt-BR');

  person.decision.edits={
    periods,
    sell:document.getElementById('editSell').checked,
    thirteen:document.getElementById('editThirteen').checked
  };

  person.decision.history=person.decision.history||[];
  person.decision.history.push({
    date:now,
    description:reason
  });

  localStorage.setItem(decisionKey(person),JSON.stringify(person.decision));

  const rowsBackup=window.__lastRows;
  closeDrawer();
  if(rowsBackup)process(rowsBackup);
}

function restoreOriginalRequest(){
  const selected=state.selected;
  if(!selected)return;

  if(!confirm('Deseja restaurar as datas e benefícios originais importados da planilha?'))return;

  const person=selected.person;
  person.decision.edits=null;
  person.decision.history=person.decision.history||[];
  person.decision.history.push({
    date:new Date().toLocaleString('pt-BR'),
    description:'Solicitação restaurada para os dados originais da planilha'
  });

  localStorage.setItem(decisionKey(person),JSON.stringify(person.decision));

  const rowsBackup=window.__lastRows;
  closeDrawer();
  if(rowsBackup)process(rowsBackup);
}

function closeDrawer(){drawer.classList.remove('open');back.classList.remove('open')}
function setTab(k){state.tab=k;renderAll()}
function pickMonth(i){month.value=String(i);renderAll()}
function clearFilters(){q.value='';sector.value='';year.value='';month.value='';approval.value='';benefit.value='';state.tab='all';renderAll()}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
async function loadArrayBuffer(buf,source){try{const wb=XLSX.read(buf,{type:'array',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:''});window.__lastRows=rows;process(rows);status.textContent=`Planilha carregada: ${source} · ${rows.length} resposta(s)`;status.className='statusbar';notice.style.display='none'}catch(e){status.textContent='Não foi possível processar a planilha: '+e.message;status.className='statusbar error'}}
async function autoLoad(){
  status.textContent='Carregando a planilha automática...';
  status.className='statusbar';
  const base=new URL('.',window.location.href);
  const attempts=[];
  for(const f of FILES){
    attempts.push(new URL(f,base).href);
    attempts.push(new URL('/'+f,window.location.origin).href);
    attempts.push(new URL(encodeURIComponent(f),base).href);
  }
  const unique=[...new Set(attempts)];
  const errors=[];
  for(const url of unique){
    try{
      const sep=url.includes('?')?'&':'?';
      const r=await fetch(url+sep+'v='+Date.now(),{cache:'no-store'});
      if(!r.ok){errors.push(`${decodeURIComponent(new URL(url).pathname)}: HTTP ${r.status}`);continue}
      const type=(r.headers.get('content-type')||'').toLowerCase();
      const buf=await r.arrayBuffer();
      if(buf.byteLength<100){errors.push(`${decodeURIComponent(new URL(url).pathname)}: arquivo vazio`);continue}
      await loadArrayBuffer(buf,decodeURIComponent(new URL(url).pathname.split('/').pop()));
      return;
    }catch(e){errors.push(`${url}: ${e.message}`)}
  }
  status.textContent='A planilha automática não foi encontrada no endereço publicado.';
  status.className='statusbar error';
  notice.style.display='block';
  notice.innerHTML='Envie para o GitHub, na <b>mesma pasta do index.html</b>, o arquivo com o nome exato:<br><b>Formulário de Intenção de Férias.xlsx</b><br><small>O nome diferencia maiúsculas, acentos e espaços. Depois, aguarde o novo deploy do Vercel.</small>';
  console.warn('Tentativas de carregamento:',errors);
}
file.addEventListener('change',async e=>{const f=e.target.files[0];if(f)await loadArrayBuffer(await f.arrayBuffer(),f.name)});['q','sector','year','month','approval','benefit'].forEach(id=>document.getElementById(id).addEventListener(id==='q'?'input':'change',renderAll));
renderTabs();renderMonths();autoLoad();
</script>
